# Sample workflow graph — conforms to the canonical authoring schema
# (graph-schema.md, D-071). This file makes the concepts concrete: nodes with
# prompts, judgements as verdict + deterministic checks (D-025), fused
# choice/edge entries (D-071), the review-fail cycle, retry caps escaping to
# escalation (D-009), a human gate node (D-032), and delivery as a hub-executed
# node feeding the merge queue (D-030).
#
# Graphs are immutable once created (D-033): POSTing this definition mints a
# new immutable graph, and every edit mints another (D-040). A chunk pins the
# graph it was minted under and moves to a newer one only by migration (D-034),
# applied by the hub atomically with a transition (D-072).

name: feature-delivery    # human label, non-unique — a correlator, like node names (D-040);
                          # the hub mints this graph's unique graph_id at creation.
                          # NOT authored here: the graph's operational METADATA — enabled
                          # (D-039), auto_migrate + migration_target (D-037/D-040) — lives
                          # BESIDE the immutable definition and is set after mint via
                          # PATCH /graphs/{id}; this file is the definition only (D-033)
entry: build              # exactly one entry node (a mint-time error otherwise)

nodes:                    # keys are node NAMES; the hub mints a universally unique
                          # node_id per node when the graph is minted — same-named
                          # nodes in different graphs are distinct nodes
  # Prompts are FILE REFERENCES, resolved relative to this YAML and inlined
  # when the graph is minted (D-033) — the stored graph carries the full
  # text, never the path. Naming convention: prompts/{node}.md for a node's
  # base prompt, prompts/{to}.from-{from}.md for an edge's prompt_addendum,
  # prompts/{node}.judgement.md for the judgement prompt (D-038).
  build:                  # node names are what runner-side gate config selects on
                          # (D-032/D-041/D-073) — there is no type field
    executor: runner
    prompt: ./prompts/build.md
    checks:               # run by the worker in-session, informing its verdict (D-077);
                          # engine-executed checks are post-MVP
      - mise run lint
      - mise run test
    judgement:
      prompt: ./prompts/build.judgement.md  # authored prose only (D-038); the engine appends
                                            # the generated elicitation tail from the choices:
                                            # "…select exactly one and output it as
                                            # <Choice>{name}</Choice>" (D-042)
      choices:            # fused entries (D-071): description + destination + optional
                          # arrival context in one place — a choice without an edge
                          # cannot be written
        pass:
          description: The work meets this node's criteria and the checks are green.
          to: review
        fail:
          description: The work does not meet the criteria; the failure output is attached.
          to: build       # failed checks re-enter build — the self-loop edge
          prompt_addendum: ./prompts/build.from-build.md   # "checks failed, output attached"
    retries:
      max: 2              # bounds FAILED ATTEMPTS only — crash, verdict-less exit, reap
                          # (D-078); a judged fail edge never consumes one. The escape
                          # hatch out of LLM error, not out of healthy iteration.
      exhausted: escalate # -> needs_human, with the takeover resume command recorded
    # Failure mode (D-009): a worker that exits with no verdict is a failure,
    # never a pass — it consumes a retry like any other failure, runner-locally
    # (no hub round-trip; the envelope carries this retries config — D-072).

  review:
    executor: runner
    prompt: ./prompts/review.md
    session: fresh        # cold eyes for review (D-054); default is resume
    produces:
      - review-findings   # asset artifact — the chunk's memory across nodes (D-026)
    judgement:
      prompt: ./prompts/review.judgement.md
      choices:
        pass:
          description: The submitted work passes review; findings are advisory only.
          to: approve-gate
        fail:
          description: Review found blocking issues, recorded in the review-findings asset.
          to: build       # THE LOOP: the findings asset is carried back into the build
                          # node's envelope on this edge; the addendum is its prose counterpart
          prompt_addendum: ./prompts/build.from-review.md  # "review failed — address every finding"
    retries:
      max: 2
      exhausted: escalate

  approve-gate:
    executor: runner
    # A chunk parked here is waiting_on_human with its reap clock stopped —
    # the ask/answer machinery reused (D-010/D-015). Delete this node for the
    # fully autonomous baseline (D-014); a runner can also impose gates on any
    # node NAME via its own local config without forking this graph (D-032/D-073).
    judgement:
      by: human           # the structural gate marker (D-041): a person renders the
                          # judgement — no judgement prompt, no worker verdict
      choices:            # the SAME Choice model (D-042): these become the board's
                          # and chat bot's buttons
        approve:
          description: Ship it — the work proceeds to delivery.
          to: deliver
        reject:
          description: Send it back to build with comments.
          to: build       # a human rejection re-enters the cycle
          prompt_addendum: ./prompts/build.from-approve-gate.md  # "rejected — comments attached"

  deliver:
    executor: hub         # the first hub-executed node (D-030); the runner holds
                          # the chunk's environments until the terminal outcome (D-066)
    mode: merge-to-main   # or open-pr (D-059); executor-specific field
    # Hub nodes have machinery-defined outcomes with DEFAULT routing (D-071):
    # deliver's are landed -> done and conflict -> this graph's entry node in
    # the MVP (D-086; the conventional cross-graph `merge` graph arrives with
    # epic:migration, D-058). Omit `judgement` entirely to accept the defaults;
    # authoring a choice entry overrides that one outcome — shown here to
    # route conflicts inline instead:
    judgement:
      choices:
        conflict:
          description: The merge or rebase onto main conflicted.
          to: build       # inline conflict routing (D-058) — landed keeps its
                          # default (done, the reserved terminal)
